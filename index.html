<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo list</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./todo.js" defer></script>
  </head>
  <body>
    <h1 class="main-heading">Todos</h1>
    <form action="" id="todo-form">
      <div class="holder">
        <label class="todo-label" for="todo">Add todo:</label>
        <input
          type="text"
          name="todo"
          id="todo"
          class="todo-input"
          placeholder="Do laundry"
        />
      </div>
      <button>Add</button>
    </form>
    <div>
      <ul class="todo-container"></ul>
    </div>
  </body>
</html>
